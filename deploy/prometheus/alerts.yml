# FDE AI Platform — Prometheus Alert Rules

groups:
  - name: fde-platform
    interval: 30s
    rules:
      - alert: HighErrorRate
        expr: rate(fde_http_requests_total{status=~"5.."}[5m]) > 0.05
        for: 5m
        labels:
          severity: critical
          category: availability
        annotations:
          summary: "High error rate on FDE platform"
          description: "5xx error rate is {{ $value | humanizePercentage }} (threshold: 5%)"

      - alert: HighLatency
        expr: histogram_quantile(0.95, rate(fde_http_request_duration_seconds_bucket[5m])) > 2
        for: 10m
        labels:
          severity: warning
          category: performance
        annotations:
          summary: "High API latency (P95 > 2 seconds)"
          description: "P95 latency is {{ $value }}s for endpoint {{ $labels.endpoint }}"

      - alert: WorkerFailureRate
        expr: rate(fde_worker_tasks_total{status="failed"}[5m]) > 0.1
        for: 5m
        labels:
          severity: critical
          category: availability
        annotations:
          summary: "High worker failure rate"
          description: "Worker {{ $labels.worker_name }} has failure rate {{ $value | humanizePercentage }}"

      - alert: RAGLatencySpike
        expr: histogram_quantile(0.95, rate(fde_rag_search_duration_seconds_bucket[5m])) > 1.0
        for: 10m
        labels:
          severity: warning
          category: performance
        annotations:
          summary: "RAG search latency spike"
          description: "P95 RAG search duration is {{ $value }}s"

      - alert: NoActiveSessions
        expr: fde_active_sessions == 0
        for: 30m
        labels:
          severity: info
          category: availability
        annotations:
          summary: "No active sessions for 30 minutes"
          description: "Platform may be idle or unreachable"

      - alert: ServiceDown
        expr: up{job="fde-backend"} == 0
        for: 1m
        labels:
          severity: critical
          category: availability
        annotations:
          summary: "FDE Backend is down"
          description: "Metrics endpoint unreachable for over 1 minute"

  # ── Observability platform monitoring (Phase 4) ──────────────────
  # Cost/budget/drift alerts are evaluated app-side by the observability
  # agent (/api/observability/alerts/evaluate); this group watches the
  # monitoring layer itself so we are never blind to our own outage.
  - name: fde-observability
    interval: 30s
    rules:
      - alert: ObservabilityEndpointErrors
        expr: rate(fde_http_requests_total{endpoint=~"/api/observability/.*",status=~"5.."}[5m]) > 0.02
        for: 5m
        labels:
          severity: warning
          category: observability
        annotations:
          summary: "Observability API returning 5xx errors"
          description: "Error rate on /api/observability is {{ $value | humanizePercentage }}"

      - alert: ObservabilityUnreachable
        expr: up{job="fde-observability"} == 0
        for: 2m
        labels:
          severity: critical
          category: observability
        annotations:
          summary: "Observability portal/API unreachable"
          description: "The /obs monitoring surface is down — alerting may be blind"

      - alert: HealthProbeFailing
        expr: max by (category) (rate(fde_http_requests_total{endpoint="/readyz",status=~"5.."}[5m])) > 0
        for: 5m
        labels:
          severity: warning
          category: observability
        annotations:
          summary: "Readiness probe (/readyz) failing"
          description: "Backend is reporting not-ready — upstream dependencies may be degraded"