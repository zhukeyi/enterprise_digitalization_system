{{- if .Values.backend.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "fde-platform.fullname" . }}-backend
  labels:
    {{- include "fde-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      {{- include "fde-platform.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        {{- include "fde-platform.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: backend
    spec:
      containers:
        - name: backend
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.backend.service.port }}
          env:
            - name: FDE_ENV
              value: {{ .Values.backend.env.FDE_ENV | quote }}
            - name: FDE_ENABLE_AUTH
              value: {{ .Values.backend.env.FDE_ENABLE_AUTH | quote }}
            {{- if .Values.backend.env.FDE_OTEL_ENABLED }}
            - name: FDE_OTEL_ENABLED
              value: {{ .Values.backend.env.FDE_OTEL_ENABLED | quote }}
            {{- end }}
          envFrom:
            - secretRef:
                name: {{ include "fde-platform.fullname" . }}-backend-secrets
          livenessProbe:
            httpGet:
              path: {{ .Values.backend.healthCheck.path }}
              port: http
            initialDelaySeconds: {{ .Values.backend.healthCheck.initialDelaySeconds }}
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: {{ .Values.backend.healthCheck.path }}
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
{{- end }}