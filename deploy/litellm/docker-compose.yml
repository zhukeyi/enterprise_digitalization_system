# ===================================================================
# FDE AI Platform — LiteLLM Proxy (standalone, P0-A / L-1)
# ===================================================================
# Deployed on :4000 using host networking so the container can reach
# the host's PostgreSQL (installed for LiteLLM virtual-key storage) on
# 127.0.0.1:5432. A 1.5G memory cap avoids the OOM-kill seen at 512M.
# P0-B merges this into the main deploy/docker-compose.prod.yml and
# wires fde-backend -> LITELLM_PROXY_URL=http://localhost:4000.
#
# Prerequisites (one-time, on the host):
#   sudo apt-get install -y postgresql postgresql-contrib
#   sudo systemctl enable --now postgresql
#   sudo -u postgres psql -c "CREATE ROLE litellm WITH LOGIN PASSWORD '...';"
#   sudo -u postgres psql -c "CREATE DATABASE litellm OWNER litellm;"
#
# Usage:
#   cd deploy/litellm
#   cp .env.example .env   # set LITELLM_MASTER_KEY + provider keys + DATABASE_URL
#   docker compose up -d
#   curl -f http://localhost:4000/health/liveliness
# ===================================================================

services:
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: fde-litellm
    # Host networking lets the proxy reach host Postgres on 127.0.0.1:5432
    # (required for virtual-key storage) and preserves :4000 on the host.
    network_mode: host
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      GLM_API_KEY: ${GLM_API_KEY}
      QWEN_API_KEY: ${QWEN_API_KEY}
      DATABASE_URL: ${DATABASE_URL}
    command: ["--config", "/app/config.yaml", "--port", "4000", "--host", "0.0.0.0"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 45s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    deploy:
      resources:
        limits:
          # LiteLLM imports all providers at boot; 512M was OOM-killed (exit 137).
          # 1.5G is safe on the 11G host (≈8G free) and leaves headroom for FDE+Dify+Qdrant.
          memory: 1536M
          cpus: "1.0"
