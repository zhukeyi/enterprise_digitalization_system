# ===================================================================
# FDE AI Platform — LiteLLM Proxy (standalone, P0-A / L-1)
# ===================================================================
# Isolated deployment on :4000 with its own bridge network and a 512M
# memory cap. Low risk to the existing stack; P0-B merges this into the
# main deploy/docker-compose.prod.yml and wires fde-backend ->
# LITELLM_PROXY_URL=http://fde-litellm:4000.
#
# Usage:
#   cd deploy/litellm
#   cp .env.example .env   # set LITELLM_MASTER_KEY + provider keys
#   docker compose up -d
#   curl -f http://localhost:4000/health/liveliness
# ===================================================================

services:
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: fde-litellm
    ports:
      - "4000:4000"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      GLM_API_KEY: ${GLM_API_KEY}
      QWEN_API_KEY: ${QWEN_API_KEY}
    command: ["--config", "/app/config.yaml", "--port", "4000", "--host", "0.0.0.0"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health/liveliness"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 45s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    deploy:
      resources:
        limits:
          # LiteLLM imports all providers at boot; 512M was OOM-killed (exit 137).
          # 1.5G is safe on the 11G host (≈8G free) and leaves headroom for FDE+Dify+Qdrant.
          memory: 1536M
          cpus: "1.0"
    networks:
      - litellm-net

networks:
  litellm-net:
    driver: bridge
