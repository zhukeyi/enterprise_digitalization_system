# ===================================================================
# FDE AI Platform — LiteLLM Proxy Configuration (P0-A / L-1)
# ===================================================================
# LiteLLM unifies 100+ LLM providers behind one OpenAI-compatible
# endpoint and provides virtual keys, per-tenant budgets, cost tracking
# and fallback. FDE's router_agent delegates model execution here.
#
# Secrets are injected via environment variables (see docker-compose.yml).
# Aliases (fde-economy / fde-default / fde-premium / fde-frontier) map to
# real provider models and are what tenants' virtual keys are scoped to.
# ===================================================================

general_settings:
  # Master key for the proxy's own admin API (/key/generate etc.)
  # Falls back to env LITELLM_MASTER_KEY if unset here.
  master_key: os.environ/LITELLM_MASTER_KEY
  # Virtual keys require a relational store. LiteLLM 1.93.0 rejects SQLite,
  # so this MUST be a PostgreSQL URL (provided via env in both the standalone
  # host deploy and docker-compose.prod.yml).
  database_url: os.environ/DATABASE_URL
  # Disable telemetry to keep the deployment self-contained.
  telemetry: false

litellm_settings:
  drop_params: true          # drop unsupported params instead of erroring
  request_timeout: 60
  # Retry+fallback on provider errors (kept lean; no extra infra).
  num_retries: 2

# NOTE: declare `custom_llm_provider` explicitly per model. This build does
# not infer the `zhipu/` / `qwen/` prefixes from the model string, and the
# config key is `custom_llm_provider` (the `litellm_provider` alias is ignored).
#
# Provider availability in ghcr.io/berriai/litellm:main-latest (litellm 1.93.0):
#   - deepseek  -> module present, works
#   - qwen      -> module is `dashscope`; use custom_llm_provider: dashscope
#   - zhipu     -> NO implementation module in this image ("Unsupported provider").
#                  glm-4-flash is still served by FDE's own router_agent adapter
#                  (backend .env GLM_API_KEY); it is omitted here until a full
#                  LiteLLM image (or custom build) that ships the zhipu provider
#                  is used. Re-enable fde-premium below once available.
model_list:
  - model_name: fde-economy
    litellm_params:
      model: deepseek-chat
      custom_llm_provider: deepseek
      api_key: os.environ/DEEPSEEK_API_KEY
      temperature: 0.3

  - model_name: fde-default
    litellm_params:
      model: deepseek-chat
      custom_llm_provider: deepseek
      api_key: os.environ/DEEPSEEK_API_KEY

  # fde-premium — zhipu/glm-4-flash provider is ABSENT in litellm:main-latest
  # (1.93.0), so we register it as a working stand-in (qwen-max / dashscope)
  # until a LiteLLM image that ships the zhipu module is used. This keeps the
  # ADDON/ENTERPRISE tier model allowlist (which references fde-premium) valid
  # for virtual-key generation; swap the model below when zhipu becomes
  # available. FDE's own glm-4-flash still runs via the backend adapter.
  - model_name: fde-premium
    litellm_params:
      model: qwen-max
      custom_llm_provider: dashscope
      api_key: os.environ/QWEN_API_KEY

  - model_name: fde-frontier
    litellm_params:
      model: qwen-max
      custom_llm_provider: dashscope
      api_key: os.environ/QWEN_API_KEY

# Routing fallbacks: if a primary alias errors, try the next.
router_settings:
  # (optional) model group fallbacks configured per-call by tenants
  enable_pre_call_checks: false
