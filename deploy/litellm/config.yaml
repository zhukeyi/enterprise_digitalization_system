# ===================================================================
# FDE AI Platform — LiteLLM Proxy Configuration (P0-A / L-1)
# ===================================================================
# LiteLLM unifies 100+ LLM providers behind one OpenAI-compatible
# endpoint and provides virtual keys, per-tenant budgets, cost tracking
# and fallback. FDE's router_agent delegates model execution here.
#
# Secrets are injected via environment variables (see docker-compose.yml).
# Aliases (fde-economy / fde-default / fde-premium / fde-frontier) map to
# real provider models and are what tenants' virtual keys are scoped to.
# ===================================================================

general_settings:
  # Master key for the proxy's own admin API (/key/generate etc.)
  # Falls back to env LITELLM_MASTER_KEY if unset here.
  master_key: os.environ/LITELLM_MASTER_KEY
  # Local in-memory store for keys (no Postgres needed on single host).
  store: "local"
  # Disable telemetry to keep the deployment self-contained.
  telemetry: false

litellm_settings:
  drop_params: true          # drop unsupported params instead of erroring
  request_timeout: 60
  # Retry+fallback on provider errors (kept lean; no extra infra).
  num_retries: 2

# NOTE: declare `custom_llm_provider` explicitly per model. This build does
# not infer the `zhipu/` / `qwen/` prefixes from the model string (it raises
# "LLM Provider NOT provided"); explicit provider is the robust, version-
# independent form. The config key is `custom_llm_provider` (not the
# `litellm_provider` alias, which this build ignores).
model_list:
  - model_name: fde-economy
    litellm_params:
      model: deepseek-chat
      custom_llm_provider: deepseek
      api_key: os.environ/DEEPSEEK_API_KEY
      temperature: 0.3

  - model_name: fde-default
    litellm_params:
      model: deepseek-chat
      custom_llm_provider: deepseek
      api_key: os.environ/DEEPSEEK_API_KEY

  - model_name: fde-premium
    litellm_params:
      model: glm-4-flash
      custom_llm_provider: zhipu
      api_key: os.environ/GLM_API_KEY

  - model_name: fde-frontier
    litellm_params:
      model: qwen-max
      custom_llm_provider: qwen
      api_key: os.environ/QWEN_API_KEY

# Routing fallbacks: if a primary alias errors, try the next.
router_settings:
  # (optional) model group fallbacks configured per-call by tenants
  enable_pre_call_checks: false
