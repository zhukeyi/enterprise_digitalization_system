# ===================================================================
# FDE AI Platform — Production Docker Compose
# ===================================================================
# Usage:
#   docker compose --env-file deploy/.env.prod -f deploy/docker-compose.prod.yml up -d
#   docker compose --env-file deploy/.env.prod -f deploy/docker-compose.prod.yml ps
#   docker compose --env-file deploy/.env.prod -f deploy/docker-compose.prod.yml down
#
# Pre-requisites:
#   1. cp deploy/config-templates/.env.prod.example deploy/.env.prod and edit
#   2. Ensure DNS points to this server
#   3. (one-click) ./deploy/scripts/up.sh
# ===================================================================

services:
  # ── Nginx Reverse Proxy (TLS termination) ──────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: fde-nginx-prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt
      - frontend_dist:/usr/share/nginx/html:ro
    depends_on:
      fde-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    networks:
      - fde-network

  # ── Certbot (Let's Encrypt auto-renewal) ───────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: fde-certbot-prod
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h; done'"
    restart: unless-stopped
    networks:
      - fde-network

  # ── FDE Backend (FastAPI) ──────────────────────────────────────
  fde-backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: fde-backend-prod
    expose:
      - "8000"
    environment:
      - FDE_ENV=production
      - FDE_ENABLE_AUTH=1
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-fde}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-fde_platform}
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - FDE_OTEL_ENABLED=${FDE_OTEL_ENABLED:-0}
      # ── P0-A/P0-B: LiteLLM gateway (gray rollout) ──
      # Set to the proxy URL to route real traffic through the gateway. In
      # this compose stack the litellm service is always present, so the
      # adapter registers and answers fde-* model aliases transparently.
      - LITELLM_PROXY_URL=http://litellm:4000
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
      - LITELLM_MODEL_ALIASES=fde-economy,fde-default,fde-frontier,fde-premium
      - WECOM_CORP_ID=${WECOM_CORP_ID:-}
      - WECOM_AGENT_ID=${WECOM_AGENT_ID:-}
      - WECOM_APP_SECRET=${WECOM_APP_SECRET:-}
      - FEISHU_APP_ID=${FEISHU_APP_ID:-}
      - FEISHU_APP_SECRET=${FEISHU_APP_SECRET:-}
    env_file:
      - .env.prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
        labels: "fde-backend"
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2"
    volumes:
      - backend_logs:/app/logs
    networks:
      - fde-network

  # ── PostgreSQL (production) ────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: fde-postgres-prod
    expose:
      - "5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fde}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-fde_platform}
      POSTGRES_INITDB_ARGS: "--data-checksums"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
      - ../shared/models/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    command: |
      postgres
      -c max_connections=200
      -c shared_buffers=256MB
      -c effective_cache_size=1GB
      -c wal_level=replica
      -c archive_mode=on
      -c archive_command='test ! -f /var/lib/postgresql/data/wal_archive/%f && cp %p /var/lib/postgresql/data/wal_archive/%f'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fde} -d ${POSTGRES_DB:-fde_platform}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1"
    networks:
      - fde-network

  # ── Redis (production) ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: fde-redis-prod
    expose:
      - "6379"
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
      --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis_data_prod:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    networks:
      - fde-network

  # ── Qdrant (production) ────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.13.4
    container_name: fde-qdrant-prod
    expose:
      - "6333"
      - "6334"
    volumes:
      - qdrant_storage_prod:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "30m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1"
    networks:
      - fde-network

  # ── MinIO (production object storage) ──────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    container_name: fde-minio-prod
    expose:
      - "9000"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-fde_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data_prod:/data
    command: server /data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    networks:
      - fde-network

  # ── Prometheus (Phase 0: uncommented for observability) ────────
  prometheus:
    image: prom/prometheus:v3.0.0
    container_name: fde-prometheus
    expose:
      - "9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
      - "--storage.tsdb.path=/prometheus"
    restart: unless-stopped
    networks:
      - fde-network

  # ── Grafana (Phase 0: uncommented for observability) ──────────
  grafana:
    image: grafana/grafana:11.3.0
    container_name: fde-grafana
    expose:
      - "3000"
    volumes:
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - grafana_data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    restart: unless-stopped
    networks:
      - fde-network

  # ── LiteLLM Gateway (P0-A / P0-B) ─────────────────────────────
  # Unified model gateway: 100+ providers, virtual keys, per-tenant budget,
  # cost tracking, fallback. FDE's router_agent delegates model execution
  # here when LITELLM_PROXY_URL is set (gray rollout).
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: fde-litellm-prod
    expose:
      - "4000"
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      # Dedicated Postgres for virtual keys (LiteLLM 1.93.0 rejects SQLite).
      DATABASE_URL: postgresql://litellm:${LITELLM_DB_PASSWORD}@litellm-postgres:5432/litellm
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      GLM_API_KEY: ${GLM_API_KEY}
      QWEN_API_KEY: ${QWEN_API_KEY}
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000", "--host", "0.0.0.0"]
    depends_on:
      litellm-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health/liveliness"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "30m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 1536M
          cpus: "1"
    networks:
      - fde-network

  litellm-postgres:
    image: postgres:16-alpine
    container_name: fde-litellm-postgres-prod
    expose:
      - "5432"
    environment:
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: ${LITELLM_DB_PASSWORD}
      POSTGRES_DB: litellm
    volumes:
      - litellm_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm -d litellm"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    networks:
      - fde-network

# ══════════════════════════════════════════════════════════════════
# Volumes
# ══════════════════════════════════════════════════════════════════

volumes:
  postgres_data_prod:
  redis_data_prod:
  qdrant_storage_prod:
  minio_data_prod:
  backend_logs:
  certbot_www:
  certbot_conf:
  frontend_dist:
  prometheus_data:
  grafana_data:
  litellm_postgres_data:

# ══════════════════════════════════════════════════════════════════
# Network
# ══════════════════════════════════════════════════════════════════

networks:
  fde-network:
    driver: bridge