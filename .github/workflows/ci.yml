# ===================================================================
# FDE AI Platform — CI Pipeline
# ===================================================================
# Triggered on: push to main, PRs targeting main
# Steps: lint → type-check → test → notify
# ===================================================================

name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**.md"
      - "LICENSE"
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**.md"
      - "LICENSE"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  UV_SYSTEM_PYTHON: "1"

jobs:
  # ── Lint ─────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff + black)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Ruff check
        run: ruff check .

      - name: Black format check
        run: black --check .

  # ── Type Check ───────────────────────────────────────────────────
  type-check:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Mypy strict check
        run: mypy conftest.py shared/ agents/ tests/

  # ── Test ─────────────────────────────────────────────────────────
  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: fde
          POSTGRES_PASSWORD: fde_test
          POSTGRES_DB: fde_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
      qdrant:
        image: qdrant/qdrant:v1.13.4
        ports:
          - 6333:6333
          - 6334:6334
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Run tests with coverage
        run: pytest --cov --cov-report=xml --cov-report=term-missing
        env:
          POSTGRES_USER: fde
          POSTGRES_PASSWORD: fde_test
          POSTGRES_DB: fde_test
          POSTGRES_PORT: 5432
          REDIS_PORT: 6379
          QDRANT_REST_PORT: 6333

      - name: Upload coverage to Codecov
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  # ── Evaluation Suite ─────────────────────────────────────────────
  eval:
    name: Evaluation Suite
    runs-on: ubuntu-latest
    needs: [test]
    continue-on-error: true    # Non-blocking gate — report only
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies (with eval extras)
        run: uv pip install --system -e ".[dev,eval]"

      - name: Run evaluation suite
        run: python -m agents.governance_agent.eval.cli --skip-promptfoo
        env:
          FDE_EVAL_LLM_BASE_URL: "http://localhost:8080/v1"

      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: eval_reports/
          retention-days: 14

  # ── Summary ──────────────────────────────────────────────────────
  ci-pass:
    name: CI Gate
    needs: [lint, type-check, test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          if [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.type-check.result }}" != "success" ] || \
             [ "${{ needs.test.result }}" != "success" ]; then
            echo "❌ CI failed"
            exit 1
          fi
          echo "✅ CI passed"